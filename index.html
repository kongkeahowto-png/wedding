<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding System | Elegant Gift Registry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e8dcc8 0%, #d4c5a9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Kantumruy Pro', system-ui, sans-serif;
            padding: 16px;
        }

        :root {
            --primary: #8B5E3C;
            --primary-dark: #6B3F2A;
            --accent: #D4AF37;
            --cream: #FFF9F0;
            --text-dark: #2C2418;
            --text-muted: #7A6B5A;
            --danger: #C62828;
            --border: #E2D5C0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 35px rgba(0,0,0,0.15);
        }

        .app-container {
            background: var(--cream);
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 932px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
        }

        header {
            padding: 24px 24px 12px;
            background: linear-gradient(135deg, var(--cream) 0%, #fdf7ed 100%);
            border-bottom: 1px solid var(--border);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .date-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary-dark);
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:active { transform: scale(0.95); background: var(--border); }
        .logo-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
        }
        .logo-area p {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .view-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 100px;
            display: none;
            animation: fadeSlide 0.3s ease;
        }
        .view-content.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-card {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 32px;
            padding: 28px 24px;
            color: white;
            margin-bottom: 28px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .summary-card::before {
            content: "✦";
            position: absolute;
            right: 10px;
            top: -20px;
            font-size: 80px;
            opacity: 0.08;
        }
        .summary-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.85;
        }
        .summary-amount {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 700;
            margin: 8px 0 20px;
        }
        .sub-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-pill {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 10px 16px;
            flex: 1;
        }
        .stat-pill p { font-size: 0.6rem; opacity: 0.8; margin-bottom: 4px; }
        .stat-pill h3 { font-size: 1.1rem; font-weight: 700; }

        .side-progress {
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            height: 8px;
            display: flex;
            overflow: hidden;
            margin: 16px 0 10px;
        }
        .progress-groom { background: #FFD966; height: 100%; transition: width 0.5s ease; }
        .progress-bride { background: #F4A261; height: 100%; transition: width 0.5s ease; }
        .side-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title span { background: var(--accent); width: 30px; height: 2px; flex: 1; opacity: 0.5; }

        .guest-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .guest-card {
            background: white;
            border-radius: 24px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .guest-card:active { transform: scale(0.99); }
        .guest-info h4 { 
            font-size: 1rem; 
            font-weight: 700; 
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge.groom { background: #FFF3E0; color: #C45C1B; }
        .badge.bride { background: #FCE4EC; color: #AD1457; }
        .badge.both { background: #E8EAF6; color: #3949AB; }
        .guest-time { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; display: inline-block; margin-left: 6px; }

        .guest-amount h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .card-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 6px;
        }
        .action-btn {
            background: transparent;
            border: none;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .edit-btn { color: var(--primary-dark); }
        .delete-btn { color: var(--danger); }
        .action-btn:active { opacity: 0.6; }

        .form-container {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .input-group {
            margin-bottom: 22px;
        }
        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: block;
        }
        input, select {
            width: 100%;
            background: #FDF8F0;
            border: 1.5px solid var(--border);
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        .quick-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 8px;
        }
        .chip {
            background: #F5EDE3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.15s;
        }
        .chip:active { background: var(--accent); color: white; transform: scale(0.95); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        .search-container input {
            padding-left: 48px;
            background: white;
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
        }
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-btn-sec {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: white;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn-sec:active { transform: scale(0.97); }
        .export-btn { color: var(--primary); }
        .clear-btn { color: var(--danger); }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 248, 235, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 20px 22px;
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }
        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
        }
        .nav-item span {
            font-size: 0.6rem;
            font-weight: 500;
        }
        .nav-item.active {
            color: var(--primary);
            transform: translateY(-2px);
        }
        .nav-item.center-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 50%;
            width: 58px;
            height: 58px;
            justify-content: center;
            margin-top: -24px;
            box-shadow: 0 8px 20px rgba(139, 94, 60, 0.3);
        }
        .nav-item.center-btn span { display: none; }
        .nav-item.center-btn svg { stroke: white; stroke-width: 2; }

        .toast {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 200;
            transition: top 0.3s ease;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }
        .toast.show { top: 70px; }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div id="toast" class="toast"><span>✨</span> <span id="toastMsg">Saved</span></div>

<div class="app-container">
    <header>
        <div class="header-top">
            <span class="date-badge" id="currentDate"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="logo-area">
            <h1>Wedding System</h1>
            <p>elegant gift registry</p>
        </div>
    </header>

    <!-- Dashboard View -->
    <main id="view-home" class="view-content active">
        <div class="summary-card">
            <div class="summary-title">TOTAL BALANCE (USD)</div>
            <div class="summary-amount" id="totalUSD">$0.00</div>
            <div class="sub-stats">
                <div class="stat-pill"><p>Total (KHR)</p><h3 id="totalKHR">0 ៛</h3></div>
                <div class="stat-pill"><p>Honored Guests</p><h3 id="totalGuests">0</h3></div>
            </div>
            <div class="side-progress">
                <div id="groomBar" class="progress-groom" style="width: 50%"></div>
                <div id="brideBar" class="progress-bride" style="width: 50%"></div>
            </div>
            <div class="side-labels">
                <span>Groom Side <strong id="groomPct">50%</strong></span>
                <span>Bride Side <strong id="bridePct">50%</strong></span>
            </div>
        </div>
        <div class="section-title"><span>✦</span> Recent Activity <span></span></div>
        <div id="recentList" class="guest-list"></div>
    </main>

    <!-- Add/Edit View -->
    <main id="view-add" class="view-content">
        <div class="section-title" style="margin-top:0"><span>✎</span> Record a Gift <span></span></div>
        <div class="form-container">
            <form id="giftForm">
                <div class="input-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="guestName" placeholder="e.g. Dara Sok" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label>💰 Amount</label>
                    <input type="number" id="amount" placeholder="0" min="1" required>
                </div>
                <div class="quick-chips">
                    <div class="chip" onclick="quickAmount(20, 'USD')">$20</div>
                    <div class="chip" onclick="quickAmount(50, 'USD')">$50</div>
                    <div class="chip" onclick="quickAmount(100, 'USD')">$100</div>
                    <div class="chip" onclick="quickAmount(50000, 'KHR')">50k ៛</div>
                    <div class="chip" onclick="quickAmount(100000, 'KHR')">100k ៛</div>
                    <div class="chip" onclick="quickAmount(200000, 'KHR')">200k ៛</div>
                </div>
                <div class="input-group">
                    <label>💱 Currency</label>
                    <select id="currency">
                        <option value="USD">🇺🇸 US Dollar (USD)</option>
                        <option value="KHR">🇰🇭 Cambodian Riel (KHR)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>👰‍♀️🤵 Guest Of</label>
                    <select id="side">
                        <option value="Both">Both Sides</option>
                        <option value="Bride">Bride Side</option>
                        <option value="Groom">Groom Side</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary">➕ Add to Registry</button>
                <button type="button" id="cancelEditBtn" class="btn-primary" style="background:#D1C4B4; margin-top:12px; display:none;">Cancel Edit</button>
            </form>
        </div>
    </main>

    <!-- Registry View -->
    <main id="view-list" class="view-content">
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search guest..." onkeyup="filterRegistry()">
        </div>
        <div class="action-bar">
            <button class="action-btn-sec export-btn" onclick="exportCSV()">📎 Export CSV</button>
            <button class="action-btn-sec clear-btn" onclick="clearAll()">🗑️ Clear All</button>
        </div>
        <div id="fullList" class="guest-list"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item center-btn" onclick="switchTab('add', this)">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>Add</span>
        </div>
        <div class="nav-item" onclick="switchTab('list', this)">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/></svg>
            <span>Registry</span>
        </div>
    </nav>
</div>

<script>
    // User System
    let currentUser = null;
    let gifts = [];
    let editId = null;

    // Initialize or load existing user
    const saved = localStorage.getItem('wedding_system_user');
    if (saved) {
        currentUser = JSON.parse(saved);
    } else {
        currentUser = { username: 'couple' };
        localStorage.setItem('wedding_system_user', JSON.stringify(currentUser));
    }

    function loadData() {
        const key = `wedding_${currentUser.username}`;
        const stored = localStorage.getItem(key);
        gifts = stored ? JSON.parse(stored) : [];
        renderAll();
    }

    function saveData() {
        const key = `wedding_${currentUser.username}`;
        localStorage.setItem(key, JSON.stringify(gifts));
    }

    function formatMoney(amount, currency) {
        if (currency === 'USD') {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        }
        return new Intl.NumberFormat('km-KH').format(amount) + ' ៛';
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function quickAmount(amt, curr) {
        document.getElementById('amount').value = amt;
        document.getElementById('currency').value = curr;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function createCard(g) {
        let badgeClass = 'both';
        let badgeText = 'Both';
        if (g.side === 'Groom') { badgeClass = 'groom'; badgeText = 'Groom'; }
        else if (g.side === 'Bride') { badgeClass = 'bride'; badgeText = 'Bride'; }
        return `
            <div class="guest-card">
                <div class="guest-info">
                    <h4>${escapeHtml(g.guestName)}</h4>
                    <div>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        <span class="guest-time">• ${g.time || ''}</span>
                    </div>
                </div>
                <div class="guest-amount">
                    <h3>${formatMoney(g.amount, g.currency)}</h3>
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="startEdit('${g.id}')">✏️ Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteRecord('${g.id}')">🗑️ Del</button>
                    </div>
                </div>
            </div>`;
    }

    function renderAll() {
        const recentDiv = document.getElementById('recentList');
        const fullDiv = document.getElementById('fullList');
        if (recentDiv) recentDiv.innerHTML = '';
        if (fullDiv) fullDiv.innerHTML = '';

        if (!gifts.length) {
            const emptyMsg = `<div class="empty-state">✨ No gifts yet<br><small>Tap + to add your first record</small></div>`;
            if (recentDiv) recentDiv.innerHTML = emptyMsg;
            if (fullDiv) fullDiv.innerHTML = emptyMsg;
        } else {
            const reversed = [...gifts].reverse();
            for (let i = 0; i < reversed.length; i++) {
                const card = createCard(reversed[i]);
                if (fullDiv) fullDiv.innerHTML += card;
                if (i < 3 && recentDiv) recentDiv.innerHTML += card;
            }
        }
        calculateStats();
    }

    function calculateStats() {
        let usd = 0, khr = 0, groomCount = 0, brideCount = 0;
        gifts.forEach(g => {
            if (g.currency === 'USD') usd += g.amount;
            else khr += g.amount;
            if (g.side === 'Groom') groomCount++;
            else if (g.side === 'Bride') brideCount++;
            else { groomCount += 0.5; brideCount += 0.5; }
        });
        document.getElementById('totalUSD').innerText = formatMoney(usd, 'USD');
        document.getElementById('totalKHR').innerText = formatMoney(khr, 'KHR');
        document.getElementById('totalGuests').innerText = gifts.length;
        
        const totalSide = groomCount + brideCount;
        let gp = 50, bp = 50;
        if (totalSide > 0) {
            gp = Math.round((groomCount / totalSide) * 100);
            bp = 100 - gp;
        }
        document.getElementById('groomBar').style.width = gp + '%';
        document.getElementById('brideBar').style.width = bp + '%';
        document.getElementById('groomPct').innerText = gp + '%';
        document.getElementById('bridePct').innerText = bp + '%';
    }

    function startEdit(id) {
        const gift = gifts.find(g => g.id === id);
        if (!gift) return;
        editId = id;
        document.getElementById('guestName').value = gift.guestName;
        document.getElementById('amount').value = gift.amount;
        document.getElementById('currency').value = gift.currency;
        document.getElementById('side').value = gift.side;
        document.getElementById('submitBtn').innerHTML = '💾 Update Record';
        document.getElementById('cancelEditBtn').style.display = 'block';
        switchTab('add', document.querySelectorAll('.nav-item')[1]);
        showToast('Edit mode: modify and save');
    }

    function resetForm() {
        editId = null;
        document.getElementById('guestName').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('submitBtn').innerHTML = '➕ Add to Registry';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    document.getElementById('giftForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('guestName').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const currency = document.getElementById('currency').value;
        const side = document.getElementById('side').value;
        
        if (!name || isNaN(amount) || amount <= 0) {
            showToast('Please enter valid name and amount');
            return;
        }
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        if (editId) {
            const idx = gifts.findIndex(g => g.id === editId);
            gifts[idx] = { ...gifts[idx], guestName: name, amount, currency, side, time: timeStr };
            showToast(`✅ Updated ${name}`);
            resetForm();
            saveData();
            renderAll();
            switchTab('list', document.querySelectorAll('.nav-item')[2]);
        } else {
            const newGift = {
                id: Date.now().toString(),
                guestName: name,
                amount,
                currency,
                side,
                time: timeStr
            };
            gifts.push(newGift);
            showToast(`🎁 Added ${name}`);
            document.getElementById('guestName').value = '';
            document.getElementById('amount').value = '';
            saveData();
            renderAll();
            document.getElementById('guestName').focus();
        }
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
        resetForm();
        showToast('Edit cancelled');
    });

    function filterRegistry() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = gifts.filter(g => g.guestName.toLowerCase().includes(query));
        const container = document.getElementById('fullList');
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state">🔍 No matching guests</div>`;
        } else {
            container.innerHTML = '';
            filtered.forEach(g => container.innerHTML += createCard(g));
        }
    }

    function deleteRecord(id) {
        if (confirm('Delete this gift record?')) {
            gifts = gifts.filter(g => g.id !== id);
            saveData();
            if (document.getElementById('searchInput').value) filterRegistry();
            else renderAll();
            showToast('Record deleted');
        }
    }

    function clearAll() {
        if (!gifts.length) return;
        if (confirm('⚠️ Permanently delete ALL registry data?')) {
            gifts = [];
            saveData();
            document.getElementById('searchInput').value = '';
            renderAll();
            showToast('All data cleared');
        }
    }

    function exportCSV() {
        if (!gifts.length) { alert('No data to export'); return; }
        let csv = "ID,Time,Guest Name,Side,Amount,Currency\n";
        gifts.forEach(g => {
            csv += `"${g.id}","${g.time}","${g.guestName}","${g.side}",${g.amount},"${g.currency}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `wedding_registry_${currentUser.username}.csv`;
        link.click();
        showToast('Exported successfully');
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${tabId}`).classList.add('active');
        if (tabId === 'list') filterRegistry();
        if (tabId === 'add' && !editId) resetForm();
    }

    function logout() {
        if (confirm('Logout from Wedding System?')) {
            localStorage.removeItem('wedding_system_user');
            location.reload();
        }
    }

    // Set current date
    const today = new Date();
    document.getElementById('currentDate').innerText = today.toLocaleDateString('en-US', { 
        weekday: 'long', 
        month: 'short', 
        day: 'numeric' 
    });

    // Initialize
    loadData();
</script>
</body>
</html>
